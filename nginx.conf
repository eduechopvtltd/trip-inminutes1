# nginx.conf — TripInMinutes Production Reverse Proxy

upstream backend {
    server localhost:4000;
    keepalive 32;
}

upstream frontend {
    server localhost:4173;  # vite preview / static
    keepalive 32;
}

server {
    listen 80;
    server_name tripinminutes.com www.tripinminutes.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tripinminutes.com www.tripinminutes.com;

    # ── SSL (replace with actual certs or use Certbot)
    ssl_certificate     /etc/letsencrypt/live/tripinminutes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tripinminutes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # ── Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ── API proxy
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Rate limit
        limit_req zone=api burst=20 nodelay;
    }

    # ── API Docs
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Static assets (long cache)
    location /assets/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Frontend SPA
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SPA fallback — serve index.html for all unknown routes
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}

# ── Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
