version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tim_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-timuser}
      POSTGRES_PASSWORD: ${DB_PASS:-timpass}
      POSTGRES_DB: ${DB_NAME:-tripinminutes}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-timuser}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tim_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASS:-redispass}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tim_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@tripinminutes.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS:-pgadmin}
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
